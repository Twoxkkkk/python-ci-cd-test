name: Test
on: 
  push:
    branches:
      - master
  
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Uv install
        uses: astral-sh/setup-uv@v5
      - name: Install deps
        run: uv lock --upgrade && uv sync
      - name: Tests
        run: uv run pytest
      
